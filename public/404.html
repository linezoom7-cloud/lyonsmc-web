<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>LyonsMC</title>
    <script>
        // GitHub Pages SPA redirect fix for BrowserRouter
        // When GitHub Pages gets a 404 (e.g. /auth/callback), it serves this page.
        // We redirect the user back to the main index page while preserving the path.
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1).join('/') +
            '/?p=' + encodeURIComponent(l.pathname + l.search) +
            (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
        );
    </script>
</head>

</body>

</html>
